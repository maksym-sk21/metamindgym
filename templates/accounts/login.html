{% extends 'base.html' %}
{% block title %}Iniciar sesión — MetaMindGym{% endblock %}

{% block content %}
<div class="max-w-md mx-auto px-6 py-24">
    <div class="bg-white border border-border-main rounded-2xl p-8">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-dark">Iniciar sesión</h1>
            <p class="text-gray-400 mt-1 text-sm">Bienvenido de nuevo</p>
        </div>
        <form method="POST" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-sm text-gray-500 mb-1.5">Correo electrónico</label>
                <input type="email" name="email"
                    class="w-full bg-surface-2 border border-border-main rounded-xl px-4 py-3 focus:outline-none focus:border-gray-400 transition text-sm text-dark"
                    placeholder="you@example.com">
            </div>
            <div>
                <label class="block text-sm text-gray-500 mb-1.5">Contraseña</label>
                <input type="password" name="password"
                    class="w-full bg-surface-2 border border-border-main rounded-xl px-4 py-3 focus:outline-none focus:border-gray-400 transition text-sm text-dark">
            </div>
            <button type="submit"
                class="w-full bg-dark text-white py-3 rounded-xl font-bold hover:bg-dark-2 transition mt-2 text-sm">
                Iniciar sesión
            </button>
        </form>
        <p class="text-center text-gray-400 text-sm mt-6">
            ¿No tienes cuenta?
            <a href="{% url 'accounts:register' %}" class="text-dark font-medium hover:underline">Registrarse</a>
        </p>
    </div>
</div>
{% endblock %}
