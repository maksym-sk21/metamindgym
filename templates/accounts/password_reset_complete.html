{% extends 'base.html' %}
{% block title %}Contraseña restablecida — MetaMindGym{% endblock %}

{% block content %}
<div class="max-w-md mx-auto px-6 py-24">
    <div class="bg-white border border-border-main rounded-2xl p-8 text-center">
        <div class="text-4xl mb-4">✅</div>
        <h1 class="text-2xl font-bold text-dark mb-2">¡Contraseña actualizada!</h1>
        <p class="text-gray-400 text-sm">Ya puedes iniciar sesión con tu nueva contraseña.</p>
        <a href="{% url 'accounts:login' %}"
            class="inline-block mt-6 w-full bg-dark text-white py-3 rounded-xl font-bold hover:bg-dark-2 transition text-sm">
            Iniciar sesión
        </a>
    </div>
</div>
{% endblock %}
