{% extends 'base.html' %}
{% block title %}{{ title }} — MetaMindGym{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto px-6 py-16">
    <div class="mb-8">
        <a href="{% url 'accounts:admin_panel' %}" class="text-gray-400 hover:text-dark transition text-sm">← Панель</a>
        <h1 class="text-2xl font-bold text-dark mt-3">{{ title }}</h1>
    </div>

    <div class="bg-white border border-border-main rounded-2xl p-8">
        <form method="POST" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-sm text-gray-500 mb-1.5">Название</label>
                <input type="text" name="title" value="{{ form.title.value|default:'' }}"
                    class="w-full bg-surface-2 border border-border-main rounded-xl px-4 py-3 focus:outline-none focus:border-gray-400 transition text-sm text-dark">
            </div>
            <div>
                <label class="block text-sm text-gray-500 mb-1.5">Описание</label>
                <textarea name="description" rows="4"
                    class="w-full bg-surface-2 border border-border-main rounded-xl px-4 py-3 focus:outline-none focus:border-gray-400 transition text-sm text-dark">{{ form.description.value|default:'' }}</textarea>
            </div>
            <div>
                <label class="block text-sm text-gray-500 mb-1.5">Тип курса</label>
                <select name="course_type"
                    class="w-full bg-surface-2 border border-border-main rounded-xl px-4 py-3 focus:outline-none focus:border-gray-400 transition text-sm text-dark">
                    {% for value, label in form.fields.course_type.choices %}
                        <option value="{{ value }}" {% if form.course_type.value == value %}selected{% endif %}>{{ label }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label class="block text-sm text-gray-500 mb-1.5">Цена (€)</label>
                <input type="number" name="price" step="0.01" value="{{ form.price.value|default:'0' }}"
                    class="w-full bg-surface-2 border border-border-main rounded-xl px-4 py-3 focus:outline-none focus:border-gray-400 transition text-sm text-dark">
            </div>
            <div>
                <label class="block text-sm text-gray-500 mb-1.5">Stripe Price ID</label>
                <input type="text" name="stripe_price_id" value="{{ form.stripe_price_id.value|default:'' }}"
                    class="w-full bg-surface-2 border border-border-main rounded-xl px-4 py-3 focus:outline-none focus:border-gray-400 transition text-sm text-dark"
                    placeholder="price_xxx">
            </div>
            <div class="flex items-center gap-3">
                <input type="checkbox" name="is_active" id="is_active"
                    {% if form.is_active.value %}checked{% endif %} class="w-4 h-4 accent-dark">
                <label for="is_active" class="text-sm text-gray-500">Активен</label>
            </div>
            <div class="flex gap-3 pt-2">
                <button type="submit" class="bg-dark text-white px-6 py-3 rounded-xl font-bold hover:bg-dark-2 transition text-sm">
                    Сохранить
                </button>
                <a href="{% url 'accounts:admin_panel' %}" class="border border-border-main px-6 py-3 rounded-xl text-sm text-gray-500 hover:text-dark hover:border-gray-400 transition">
                    Отмена
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
